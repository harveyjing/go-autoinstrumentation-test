apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: demo
data:
  default.conf: |
    upstream order_service {
        server order-service:8080;
    }

    server {
        listen 80;

        location /healthz {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass         http://order_service;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: demo
  labels:
    app: nginx-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
      annotations:
        instrumentation.opentelemetry.io/inject-nginx: "true"
    spec:
      containers:
        - name: nginx
          # Operator supports: 1.22.0, 1.23.0, 1.23.1
          image: nginx:1.23.1
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: demo
spec:
  selector:
    app: nginx-gateway
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30374
