apiVersion: apps/v1
kind: Deployment
metadata:
  name: validation-service
  namespace: demo
  labels:
    app: validation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validation-service
  template:
    metadata:
      labels:
        app: validation-service
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
        instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/app/server"
    spec:
      containers:
        - name: validation-service
          image: validation-service:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "8081"
            - name: OTEL_SERVICE_NAME
              value: validation-service
          ports:
            - containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: validation-service
  namespace: demo
spec:
  selector:
    app: validation-service
  ports:
    - port: 80
      targetPort: 8081
